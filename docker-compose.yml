services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB:       fraise_chat
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - ./docker/init:/docker-entrypoint-initdb.d
      - fraise_chat_data:/var/lib/postgresql/data

volumes:
  fraise_chat_data:
